name: CI

on:
  pull_request:
    branches: [staging, main]
  push:
    branches:
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"

permissions:
  contents: read

jobs:
  vote-build-test:
    name: Vote build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vote
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven

      - name: Build and test vote
        run: mvn -B -ntp test package

  worker-build-test:
    name: Worker build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Download dependencies
        run: go mod download

      - name: Test worker
        run: go test ./...

      - name: Build worker
        run: go build ./...

  result-build:
    name: Result dependency and build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: result
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate installed dependencies
        run: npm ls --depth=0

  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs: [vote-build-test, worker-build-test, result-build]
    strategy:
      fail-fast: false
      matrix:
        service: [vote, worker, result]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t local/${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}
